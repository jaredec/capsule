name: Capsule Daily Trend Fetcher

on:
  workflow_dispatch:
  schedule:
    # 06:00 UTC every day = ~1am Central / 2am Eastern
    - cron: '0 6 * * *'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch trend
        working-directory: backend
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PLATFORM: x
        run: python fetch_daily_trend.py

      - name: Commit & push if changed
        run: |
          git config user.name "capsule-bot"
          git config user.email "capsule-bot@users.noreply.github.com"
          if [[ -n "$(git status --porcelain frontend/data/trends.json)" ]]; then
            git add frontend/data/trends.json
            git commit -m "Add trend for $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No changes to commit."
          fi
